name: CI — PlatformIO build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build (PlatformIO) on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Ensure platformio.ini exists
        run: |
          if [ ! -f platformio.ini ]; then
            echo "platformio.ini not found in repository root. Add one to build. Failing."
            exit 1
          fi
        shell: bash

      - name: Create mock private.ini for CI build
        run: |
          cp private.ini.template private.ini
        shell: bash

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pioenvs
            .piolibdeps
          key: ${{ runner.os }}-platformio-${{ hashFiles('**/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO Core
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U platformio
        # use default shell (bash on ubuntu, pwsh on windows) — python -m pip works cross-platform

      - name: Build all environments
        run: |
          echo "Building all environments defined in platformio.ini"
          # Use the python module runner to avoid PATH/launcher issues across OSes
          python -m platformio run

