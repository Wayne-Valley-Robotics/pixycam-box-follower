; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
extra_configs = private.ini

[env:nano_33_iot]
platform = atmelsam
board = nano_33_iot
framework = arduino
monitor_speed = 115200
lib_deps = 
	janelia-arduino/Vector@^1.2.2
	mikalhart/Streaming@^1.0.0
	arduino-libraries/Arduino_LSM6DS3@^1.0.3
	jandrassy/ArduinoOTA@^1.1.1
	arduino-libraries/WiFiNINA@^2.0.1

; wireless settings
upload_protocol = arduino
upload_port = ${secrets.upload_port}

build_flags = ${secrets.build_flags}